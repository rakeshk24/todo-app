<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Todo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Edit Todo</h1>

        <div class="add-todo-section">
            <form method="POST" action="{{ url_for('edit_todo', todo_id=todo.id) }}" class="todo-form">
                <input
                    type="text"
                    name="title"
                    placeholder="Todo title"
                    value="{{ todo.title }}"
                    required
                    class="input-field"
                />
                <textarea
                    name="description"
                    placeholder="Description (optional)"
                    class="input-field"
                >{{ todo.description or '' }}</textarea>
                <input
                    type="datetime-local"
                    name="deadline"
                    class="input-field"
                    value="{% if todo.deadline %}{{ todo.deadline.strftime('%Y-%m-%dT%H:%M') }}{% endif %}"
                />
                <select name="priority" class="input-field">
                    <option value="low" {% if todo.priority == 'low' %}selected{% endif %}>Low Priority</option>
                    <option value="medium" {% if todo.priority == 'medium' %}selected{% endif %}>Medium Priority</option>
                    <option value="high" {% if todo.priority == 'high' %}selected{% endif %}>High Priority</option>
                </select>
                <div class="button-group">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
